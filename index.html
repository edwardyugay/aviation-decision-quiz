<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aviation Decision Quiz</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { min-height: 100%; }
    body { margin: 0; }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    .slide-in { animation: slideIn 0.35s ease-out; }
    .bar-grow { transition: width 0.7s ease-out; }
    .btn-pop { transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease; }
    .btn-pop:hover { transform: scale(1.01); }
    .btn-pop:active { transform: scale(0.99); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-slate-950 text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState, useEffect } = React;

    const results = {
      analytical: {
        title: '분석형 안전관리자',
        subtitle: '절차와 근거를 중시하는 판단 스타일',
        summary:
          '체크리스트와 데이터 기반 판단에 강합니다. 정확성과 안전 마진 확보에 유리하지만, 시간 압박 상황에서는 판단 속도가 떨어질 수 있습니다.',
        strengths: ['절차 준수', '위험 신호 탐지', '체계적 사고'],
        risks: ['판단 속도 저하', '인지 부하 증가', '유연성 부족'],
        color: 'from-sky-500 to-blue-700',
      },
      expert: {
        title: '전문가형 패턴 인식자',
        subtitle: '고연차 조종사형 빠르고 유연한 판단',
        summary:
          '패턴 인식과 직관적 판단이 강합니다. 빠르고 유연하지만, 자동화 과신과 새로운 위협 과소평가에 주의해야 합니다.',
        strengths: ['빠른 판단', '패턴 인식', '상황 적응력'],
        risks: ['자동화 과신', '새 위협 과소평가', '암묵지 의존'],
        color: 'from-cyan-500 to-sky-700',
      },
      collaborative: {
        title: 'CRM 협업형 리더',
        subtitle: '의사소통과 상호견제를 활용하는 스타일',
        summary:
          '혼자 결정하기보다 팀의 정보를 통합해 더 나은 판단을 만드는 유형입니다. 항공 안전 문화와 매우 잘 맞습니다.',
        strengths: ['소통', '교차확인', '심리적 안전감'],
        risks: ['결정 지연', '타인 의존', '리더십 약화 가능성'],
        color: 'from-blue-500 to-indigo-700',
      },
      cautious: {
        title: '위험감지형 판단자',
        subtitle: '안전 마진과 오류 예방에 민감한 스타일',
        summary:
          '위험을 조기에 감지하고 안전 중심으로 판단합니다. 매우 유익한 성향이지만 지나친 보수성은 기회 손실로 이어질 수 있습니다.',
        strengths: ['보수적 판단', '오류 예방', '안전 중심 사고'],
        risks: ['느린 결심', '과도한 위험 회피', '기회 손실'],
        color: 'from-emerald-500 to-teal-700',
      },
      flexible: {
        title: '전환 유연형 의사결정자',
        subtitle: '직관과 분석을 상황에 맞게 조절하는 스타일',
        summary:
          '상황에 따라 분석과 직관을 균형 있게 전환합니다. 고숙련 조종사에게서 자주 보이는 핵심 역량입니다.',
        strengths: ['인지 전환', '균형 잡힌 판단', '상황 적응'],
        risks: ['피로 시 일관성 저하', '경험 패턴 의존', '스트레스 상황 흔들림'],
        color: 'from-violet-500 to-indigo-700',
      },
      overconfident: {
        title: '과신 위험형',
        subtitle: '경험 의존이 강하지만 편향 통제가 필요한 스타일',
        summary:
          '빠르게 결론을 내리는 추진력이 강합니다. 하지만 중간연차의 함정과 유사하게 과신 편향과 모니터링 감소 위험이 있습니다.',
        strengths: ['결단력', '추진력', '행동성'],
        risks: ['과신 편향', '모니터링 감소', '반대 증거 무시'],
        color: 'from-amber-500 to-orange-700',
      },
      rigid: {
        title: '고착형 절차 추종자',
        subtitle: '계획 유지에는 강하지만 변화 대응이 늦을 수 있는 스타일',
        summary:
          '계획과 초기 판단을 유지하려는 성향이 강합니다. 안정적이지만 상황 변화에 늦게 반응할 가능성이 있습니다.',
        strengths: ['일관성', '규율성', '절차 유지'],
        risks: ['앵커링', 'plan continuation bias', '적응 지연'],
        color: 'from-slate-500 to-slate-700',
      },
    };

    const questions = [
      {
        id: 1,
        text: '비행 중 예상치 못한 경고가 발생했습니다. 당신의 첫 반응은?',
        image: 'assets/q1.avif',
        options: [
          { text: '즉시 체크리스트와 절차를 하나씩 확인한다', scores: { analytical: 2, cautious: 1 } },
          { text: '상황을 빠르게 패턴으로 인식하고 우선순위를 정한다', scores: { expert: 2, flexible: 1 } },
          { text: '기존에 문제 없었던 경험을 떠올리며 일단 지켜본다', scores: { overconfident: 2 } },
          { text: '동료와 즉시 교차 확인하며 판단을 보완한다', scores: { collaborative: 2, cautious: 1 } },
        ],
      },
      {
        id: 2,
        text: '착륙 직전 기상 상황이 갑자기 악화되었습니다. 당신은 어떻게 판단합니까?',
        image: 'assets/q2.webp',
        options: [
          { text: '복행 가능성을 먼저 검토하고 안전 마진을 계산한다', scores: { analytical: 1, cautious: 2 } },
          { text: '유사 상황 경험을 떠올려 가장 실행 가능한 선택지를 빠르게 고른다', scores: { expert: 2 } },
          { text: '계획을 바꾸지 않고 원래 착륙을 계속 시도한다', scores: { overconfident: 2, rigid: 1 } },
          { text: '기장/부기장 간 명확한 callout 후 재결정한다', scores: { collaborative: 2, flexible: 1 } },
        ],
      },
      {
        id: 3,
        text: '중간 연차 조종사에게 가장 위험한 함정은 무엇이라고 생각합니까?',
        image: 'assets/q3.jpg',
        options: [
          { text: '지식 부족', scores: { analytical: 1 } },
          { text: '과신 편향과 휴리스틱 의존', scores: { flexible: 1, expert: 1 } },
          { text: '너무 많은 협업', scores: { rigid: 1 } },
          { text: '느린 반응 속도만의 문제', scores: { overconfident: 1 } },
        ],
      },
      {
        id: 4,
        text: 'FORDEC 같은 구조화된 의사결정 도구의 가장 큰 장점은?',
        image: 'assets/q4.jpg',
        options: [
          { text: '직관을 멈추고 분석적 사고를 다시 활성화한다', scores: { analytical: 2, cautious: 1 } },
          { text: '숙련자가 절차 없이도 더 빠르게 결정하게 한다', scores: { overconfident: 2 } },
          { text: '항상 같은 답을 보장한다', scores: { rigid: 2 } },
          { text: '팀 커뮤니케이션과 재평가를 돕는다', scores: { collaborative: 2, flexible: 1 } },
        ],
      },
      {
        id: 5,
        text: '당신이 비행 중 자신의 판단을 점검하는 방식에 가장 가까운 것은?',
        image: 'assets/q5.jpg',
        options: [
          { text: '내 판단이 틀렸다면 어떤 신호가 있을지 먼저 찾는다', scores: { cautious: 2, analytical: 1 } },
          { text: '경험상 맞다고 느껴지면 밀고 나간다', scores: { overconfident: 2 } },
          { text: '상황에 따라 직관과 분석을 빠르게 오간다', scores: { expert: 2, flexible: 2 } },
          { text: '혼자 판단하지 않고 팀의 challenge를 적극 활용한다', scores: { collaborative: 2, cautious: 1 } },
        ],
      },
    ];

    function SelfTests() {
      useEffect(() => {
        console.assert(Array.isArray(questions) && questions.length === 5, 'Expected 5 questions');
        console.assert(Object.keys(results).length >= 7, 'Expected at least 7 result profiles');
        questions.forEach((q, index) => {
          console.assert(typeof q.text === 'string' && q.text.length > 0, `Question ${index + 1} needs text`);
          console.assert(typeof q.image === 'string' && q.image.length > 0, `Question ${index + 1} needs image path`);
          console.assert(Array.isArray(q.options) && q.options.length >= 2, `Question ${index + 1} needs options`);
        });
      }, []);
      return null;
    }

    function ScoreBars({ answers }) {
      const totals = useMemo(() => {
        const base = {
          analytical: 0,
          expert: 0,
          collaborative: 0,
          cautious: 0,
          flexible: 0,
          overconfident: 0,
          rigid: 0,
        };

        answers.forEach((scoreObj) => {
          Object.entries(scoreObj).forEach(([key, val]) => {
            base[key] += val;
          });
        });

        return Object.entries(base).sort((a, b) => b[1] - a[1]);
      }, [answers]);

      const max = Math.max(...totals.map(([, v]) => v), 1);

      return (
        <div className="space-y-3">
          {totals.map(([key, value]) => (
            <div key={key}>
              <div className="mb-1 flex items-center justify-between text-sm text-slate-300">
                <span>{results[key].title}</span>
                <span>{value}</span>
              </div>
              <div className="h-2 overflow-hidden rounded-full bg-slate-800">
                <div
                  className={`bar-grow h-full rounded-full bg-gradient-to-r ${results[key].color}`}
                  style={{ width: `${(value / max) * 100}%` }}
                />
              </div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [started, setStarted] = useState(false);
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [finished, setFinished] = useState(false);
      const [selected, setSelected] = useState(null);

      const currentQuestion = questions[current];
      const progress = ((current + (finished ? 1 : 0)) / questions.length) * 100;

      const handleAnswer = (option) => {
        setSelected(option.text);
        window.setTimeout(() => {
          const nextAnswers = [...answers, option.scores];
          setAnswers(nextAnswers);
          setSelected(null);

          if (current < questions.length - 1) {
            setCurrent(current + 1);
          } else {
            setFinished(true);
          }
        }, 350);
      };

      const result = useMemo(() => {
        if (!finished) return null;

        const totals = {};
        answers.forEach((scoreObj) => {
          Object.entries(scoreObj).forEach(([key, val]) => {
            totals[key] = (totals[key] || 0) + val;
          });
        });

        const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
        const topKey = sorted[0]?.[0] || 'analytical';
        return results[topKey];
      }, [answers, finished]);

      const restart = () => {
        setStarted(false);
        setCurrent(0);
        setAnswers([]);
        setFinished(false);
        setSelected(null);
      };

      return (
        <div className="min-h-screen bg-[radial-gradient(circle_at_top,#0f3d68,transparent_28%),linear-gradient(180deg,#020617_0%,#0f172a_40%,#020617_100%)] text-white">
          <SelfTests />
          <div className="mx-auto max-w-6xl px-4 py-8 md:px-8">
            <div className="fade-in mb-8 overflow-hidden rounded-[28px] border border-sky-900/40 bg-white/5 backdrop-blur-sm">
              <div className="grid items-center gap-6 md:grid-cols-[1.2fr_0.8fr]">
                <div className="p-8 md:p-10">
                  <div className="mb-3 inline-flex items-center gap-2 rounded-full border border-sky-500/30 bg-sky-500/10 px-3 py-1 text-xs font-semibold tracking-[0.18em] text-sky-300 uppercase">
                    Aviation Decision Quiz
                  </div>
                  <h1 className="mb-3 text-3xl font-bold leading-tight md:text-5xl">
                    비행 연차별 인지적 의사결정 테스트
                  </h1>
                  <p className="max-w-2xl text-sm leading-7 text-slate-300 md:text-base">
                    항공 안전, Human Factors, SRK, RPD, Cognitive Continuum Theory, 그리고 중간연차의 함정을 쉽고 흥미롭게 이해할 수 있는 인터랙티브 퀴즈입니다.
                  </p>
                </div>
                <div className="p-6 md:p-8">
                  <div className="rounded-[24px] border border-white/10 bg-slate-900/70 p-5 shadow-2xl">
                    <img
                      src="assets/hero.jpg"
                      alt="aviation cockpit"
                      className="h-64 w-full rounded-2xl object-cover"
                    />
                    <div className="mt-4 grid grid-cols-3 gap-3 text-center text-sm">
                      <div className="rounded-2xl bg-white/5 p-3">
                        <div className="text-xl font-bold text-sky-300">5</div>
                        <div className="text-slate-400">Questions</div>
                      </div>
                      <div className="rounded-2xl bg-white/5 p-3">
                        <div className="text-xl font-bold text-sky-300">7</div>
                        <div className="text-slate-400">Profiles</div>
                      </div>
                      <div className="rounded-2xl bg-white/5 p-3">
                        <div className="text-xl font-bold text-sky-300">100%</div>
                        <div className="text-slate-400">Interactive</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {!started && !finished && (
              <div className="fade-in rounded-[28px] border border-white/10 bg-white/5 p-8 backdrop-blur-sm">
                <div className="grid gap-4 md:grid-cols-3">
                  <div className="rounded-2xl bg-slate-950/40 p-5">
                    <div className="mb-2 text-sky-300">핵심 이론</div>
                    <p className="text-sm leading-6 text-slate-300">SRK, RPD, 인지적 편향, 중간연차의 함정</p>
                  </div>
                  <div className="rounded-2xl bg-slate-950/40 p-5">
                    <div className="mb-2 text-sky-300">활용 방식</div>
                    <p className="text-sm leading-6 text-slate-300">발표 마무리, 수업 참여, 팀별 토론용으로 적합</p>
                  </div>
                  <div className="rounded-2xl bg-slate-950/40 p-5">
                    <div className="mb-2 text-sky-300">결과 출력</div>
                    <p className="text-sm leading-6 text-slate-300">성향 진단, 취약점 분석, 간단한 시각화 제공</p>
                  </div>
                </div>
                <button
                  onClick={() => setStarted(true)}
                  className="btn-pop mt-6 inline-flex items-center gap-2 rounded-2xl bg-sky-500 px-6 py-3 font-semibold text-slate-950 hover:bg-sky-400"
                >
                  시작하기
                </button>
              </div>
            )}

            {started && !finished && currentQuestion && (
              <div className="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
                <div key={current} className="slide-in rounded-[28px] border border-white/10 bg-white/5 p-6 backdrop-blur-sm">
                  <div className="mb-4">
                    <div className="mb-1 text-xs font-semibold uppercase tracking-[0.18em] text-sky-300">
                      Question {current + 1} / {questions.length}
                    </div>
                    <h2 className="text-2xl font-bold leading-snug md:text-3xl">{currentQuestion.text}</h2>
                  </div>

                  <div className="mb-5 h-3 overflow-hidden rounded-full bg-slate-800">
                    <div className="bar-grow h-full rounded-full bg-gradient-to-r from-sky-400 to-blue-600" style={{ width: `${progress}%` }} />
                  </div>

                  <img
                    src={currentQuestion.image}
                    alt="question visual"
                    className="mb-5 h-72 w-full rounded-[24px] object-cover shadow-2xl"
                  />

                  <div className="space-y-3">
                    {currentQuestion.options.map((opt, i) => {
                      const active = selected === opt.text;
                      return (
                        <button
                          key={i}
                          onClick={() => handleAnswer(opt)}
                          className={`btn-pop block w-full rounded-2xl border px-5 py-4 text-left ${
                            active
                              ? 'border-sky-400 bg-sky-500/15 shadow-lg shadow-sky-500/10'
                              : 'border-white/10 bg-slate-950/40 hover:border-sky-500/40 hover:bg-sky-500/5'
                          }`}
                        >
                          <div className="text-base leading-7 text-slate-100">{opt.text}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="fade-in rounded-[28px] border border-white/10 bg-white/5 p-6 backdrop-blur-sm">
                  <h3 className="mb-4 text-xl font-bold">실시간 진행 현황</h3>
                  <div className="mb-6 rounded-2xl bg-slate-950/40 p-4">
                    <div className="mb-2 flex items-center justify-between text-sm text-slate-400">
                      <span>진행률</span>
                      <span>{Math.round(progress)}%</span>
                    </div>
                    <div className="h-2 overflow-hidden rounded-full bg-slate-800">
                      <div className="bar-grow h-full rounded-full bg-gradient-to-r from-cyan-400 to-blue-600" style={{ width: `${progress}%` }} />
                    </div>
                  </div>

                  <div className="mb-6 grid grid-cols-2 gap-3 text-sm">
                    <div className="rounded-2xl bg-slate-950/40 p-4">
                      <div className="text-slate-400">완료 문항</div>
                      <div className="text-2xl font-bold text-sky-300">{answers.length}</div>
                    </div>
                    <div className="rounded-2xl bg-slate-950/40 p-4">
                      <div className="text-slate-400">남은 문항</div>
                      <div className="text-2xl font-bold text-sky-300">{questions.length - answers.length}</div>
                    </div>
                  </div>

                  <div className="rounded-2xl bg-slate-950/40 p-4">
                    <div className="mb-3 text-sky-300">현재 성향 분포</div>
                    <ScoreBars answers={answers} />
                  </div>
                </div>
              </div>
            )}

            {finished && result && (
              <div className="fade-in space-y-6">
                <div className={`rounded-[28px] border border-white/10 bg-gradient-to-br ${result.color} p-8 shadow-2xl`}>
                  <div className="mb-3 inline-flex items-center gap-2 rounded-full bg-white/15 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-white/90">
                    Final Result
                  </div>
                  <h2 className="mb-2 text-3xl font-bold md:text-5xl">{result.title}</h2>
                  <p className="mb-4 text-white/90 md:text-lg">{result.subtitle}</p>
                  <p className="max-w-3xl leading-7 text-white/95">{result.summary}</p>
                </div>

                <div className="grid gap-6 lg:grid-cols-[1fr_1fr]">
                  <div className="rounded-[28px] border border-white/10 bg-white/5 p-6 backdrop-blur-sm">
                    <h3 className="mb-4 text-xl font-bold">결과 분석 그래프</h3>
                    <ScoreBars answers={answers} />
                  </div>

                  <div className="rounded-[28px] border border-white/10 bg-white/5 p-6 backdrop-blur-sm">
                    <h3 className="mb-4 text-xl font-bold">핵심 포인트</h3>
                    <div className="grid gap-4 md:grid-cols-2">
                      <div className="rounded-2xl bg-slate-950/40 p-4">
                        <div className="mb-2 text-sm font-semibold text-sky-300">강점</div>
                        <ul className="space-y-2 text-sm text-slate-200">
                          {result.strengths.map((item) => <li key={item}>• {item}</li>)}
                        </ul>
                      </div>
                      <div className="rounded-2xl bg-slate-950/40 p-4">
                        <div className="mb-2 text-sm font-semibold text-amber-300">취약점</div>
                        <ul className="space-y-2 text-sm text-slate-200">
                          {result.risks.map((item) => <li key={item}>• {item}</li>)}
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="rounded-[28px] border border-white/10 bg-white/5 p-6 backdrop-blur-sm">
                  <h3 className="mb-3 text-xl font-bold">발표에서 이렇게 활용하면 좋습니다</h3>
                  <p className="leading-7 text-slate-300">
                    이 테스트는 발표 마지막에 청중 참여를 유도하는 활동으로 매우 효과적입니다. 결과를 보여준 뒤, 왜 이런 성향이 나왔는지 토론하게 하면 SRK, RPD, CRM, 중간연차의 함정을 자연스럽게 연결할 수 있습니다.
                  </p>
                  <div className="mt-5 flex flex-wrap gap-3">
                    <button
                      onClick={restart}
                      className="btn-pop inline-flex items-center gap-2 rounded-2xl bg-sky-500 px-5 py-3 font-semibold text-slate-950 hover:bg-sky-400"
                    >
                      다시 하기
                    </button>
                    <button
                      onClick={() => window.print()}
                      className="btn-pop rounded-2xl border border-white/10 px-5 py-3 font-semibold text-slate-200 hover:border-slate-400"
                    >
                      결과 저장 / 인쇄
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
